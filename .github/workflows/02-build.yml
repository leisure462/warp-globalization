name: 02 Build

on:
  repository_dispatch:
    types: [build-ready]
  workflow_run:
    workflows: ["01 Translate"]
    types: [completed]
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: "Warp upstream release/tag/branch/commit; use latest for the latest release"
        type: string
        required: false
        default: "latest"
      lang:
        description: "Translation language"
        type: choice
        options:
          - zh-CN
        default: zh-CN
      platform:
        description: "Platform to build"
        type: choice
        options:
          - windows-x86_64
          - linux-x86_64
          - macos-aarch64
          - all
        default: windows-x86_64
      publish_release:
        description: "Publish GitHub Release"
        type: boolean
        default: true
      build_installer:
        description: "Build native installer when supported"
        type: boolean
        default: true

permissions:
  contents: write
  actions: read

concurrency:
  group: build-${{ github.event_name }}-${{ github.run_id }}
  cancel-in-progress: false

env:
  WARP_REPO: https://github.com/warpdotdev/warp.git
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CARGO_TERM_COLOR: always
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"
  RUSTFLAGS: -C debuginfo=line-tables-only --cfg=web_sys_unstable_apis

jobs:
  prepare:
    name: Prepare localization patch
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    outputs:
      upstream_ref: ${{ steps.upstream.outputs.sha }}
      source_ref: ${{ steps.upstream.outputs.source_ref }}
      version: ${{ steps.upstream.outputs.version }}
      lang: ${{ steps.vars.outputs.lang }}
      platform: ${{ steps.vars.outputs.platform }}
      publish_release: ${{ steps.vars.outputs.publish_release }}
      build_installer: ${{ steps.vars.outputs.build_installer }}
      should_build: ${{ steps.vars.outputs.should_build }}
      is_prerelease: ${{ steps.vars.outputs.is_prerelease }}
    steps:
      - name: Checkout localization repo
        uses: actions/checkout@v6

      - name: Download build request from translate run
        if: ${{ github.event_name == 'workflow_run' }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build-request
          gh run download "${{ github.event.workflow_run.id }}" \
            --repo "${{ github.repository }}" \
            --name build-request \
            --dir build-request || true

      - name: Set run variables
        id: vars
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            UPSTREAM_REF="${{ github.event.client_payload.upstream_ref }}"
            SOURCE_REF="${{ github.event.client_payload.source_ref }}"
            VERSION="${{ github.event.client_payload.version }}"
            LANG="${{ github.event.client_payload.lang }}"
            PLATFORM="${{ github.event.client_payload.platform }}"
            PUBLISH_RELEASE="${{ github.event.client_payload.publish_release }}"
            BUILD_INSTALLER="${{ github.event.client_payload.build_installer }}"
            IS_PRERELEASE="${{ github.event.client_payload.is_prerelease }}"
            SHOULD_BUILD="true"
          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            if [ -f build-request/build-request.env ]; then
              set -a
              . build-request/build-request.env
              set +a
              SHOULD_BUILD="${CHAIN_BUILD:-false}"
            else
              echo "::notice::No build request artifact found; skipping chained build."
              SHOULD_BUILD="false"
            fi
            UPSTREAM_REF="${UPSTREAM_REF:-master}"
            SOURCE_REF="${SOURCE_REF:-$UPSTREAM_REF}"
            VERSION="${VERSION:-}"
            LANG="${LANG:-zh-CN}"
            PLATFORM="${PLATFORM:-windows-x86_64}"
            PUBLISH_RELEASE="${PUBLISH_RELEASE:-false}"
            BUILD_INSTALLER="${BUILD_INSTALLER:-false}"
            IS_PRERELEASE="${IS_PRERELEASE:-false}"
          else
            UPSTREAM_REF="${{ inputs.upstream_ref }}"
            SOURCE_REF="$UPSTREAM_REF"
            VERSION=""
            LANG="${{ inputs.lang }}"
            PLATFORM="${{ inputs.platform }}"
            PUBLISH_RELEASE="${{ inputs.publish_release }}"
            BUILD_INSTALLER="${{ inputs.build_installer }}"
            IS_PRERELEASE="false"
            SHOULD_BUILD="true"
          fi

          if [ "$SHOULD_BUILD" = "true" ]; then
            UPSTREAM_REF="${UPSTREAM_REF:-latest}"
            if [ "$UPSTREAM_REF" = "latest" ]; then
              RELEASE_JSON="$(gh api repos/warpdotdev/warp/releases/latest)"
              UPSTREAM_REF="$(echo "$RELEASE_JSON" | jq -r '.tag_name // empty')"
              SOURCE_REF="$UPSTREAM_REF"
              VERSION="$UPSTREAM_REF"
              IS_PRERELEASE="$(echo "$RELEASE_JSON" | jq -r '.prerelease // false')"
              if [ -z "$UPSTREAM_REF" ] || [ "$UPSTREAM_REF" = "null" ]; then
                echo "::error::Unable to resolve latest Warp release."
                exit 1
              fi
            elif [ -z "${VERSION:-}" ]; then
              RELEASE_JSON="$(gh api "repos/warpdotdev/warp/releases/tags/$UPSTREAM_REF" 2>/dev/null || true)"
              RELEASE_TAG="$(echo "$RELEASE_JSON" | jq -r '.tag_name // empty' 2>/dev/null || true)"
              if [ -n "$RELEASE_TAG" ] && [ "$RELEASE_TAG" != "null" ]; then
                UPSTREAM_REF="$RELEASE_TAG"
                SOURCE_REF="$RELEASE_TAG"
                VERSION="$RELEASE_TAG"
                IS_PRERELEASE="$(echo "$RELEASE_JSON" | jq -r '.prerelease // false')"
              fi
            fi
          fi

          LANG="${LANG:-zh-CN}"
          PLATFORM="${PLATFORM:-windows-x86_64}"
          PUBLISH_RELEASE="${PUBLISH_RELEASE:-true}"
          BUILD_INSTALLER="${BUILD_INSTALLER:-true}"
          IS_PRERELEASE="${IS_PRERELEASE:-false}"
          SHOULD_BUILD="${SHOULD_BUILD:-true}"
          echo "should_build=$SHOULD_BUILD" >> "$GITHUB_OUTPUT"
          echo "upstream_ref=$UPSTREAM_REF" >> "$GITHUB_OUTPUT"
          echo "source_ref=${SOURCE_REF:-$UPSTREAM_REF}" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "lang=$LANG" >> "$GITHUB_OUTPUT"
          echo "platform=$PLATFORM" >> "$GITHUB_OUTPUT"
          echo "publish_release=$PUBLISH_RELEASE" >> "$GITHUB_OUTPUT"
          echo "build_installer=$BUILD_INSTALLER" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        if: ${{ steps.vars.outputs.should_build == 'true' }}
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install localization tool
        if: ${{ steps.vars.outputs.should_build == 'true' }}
        run: pip install .

      - name: Checkout Warp upstream
        if: ${{ steps.vars.outputs.should_build == 'true' }}
        id: upstream
        shell: bash
        run: |
          set -euo pipefail
          REF="${{ steps.vars.outputs.upstream_ref }}"
          SOURCE_REF="${{ steps.vars.outputs.source_ref }}"
          if [ "$REF" = "main" ] \
            && ! git ls-remote --exit-code --heads "$WARP_REPO" main >/dev/null 2>&1 \
            && git ls-remote --exit-code --heads "$WARP_REPO" master >/dev/null 2>&1; then
            echo "::warning::Warp upstream has no main branch; falling back to master."
            REF="master"
            if [ "$SOURCE_REF" = "main" ]; then
              SOURCE_REF="master"
            fi
          fi
          git clone --filter=blob:none "$WARP_REPO" warp
          cd warp
          git checkout "$REF" 2>/dev/null || {
            git fetch --depth 1 origin "$REF"
            git checkout FETCH_HEAD
          }
          FULL_SHA="$(git rev-parse HEAD)"
          SHA="$(git rev-parse --short=12 HEAD)"
          VERSION="${{ steps.vars.outputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION="$REF"
            if [ "$REF" = "main" ] || [ "$REF" = "master" ]; then
              VERSION="${REF}-${SHA}"
            fi
            VERSION="${VERSION//\//-}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "sha=$FULL_SHA" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          echo "source_ref=${SOURCE_REF:-$REF}" >> "$GITHUB_OUTPUT"

      - name: Get translation data
        if: ${{ steps.vars.outputs.should_build == 'true' }}
        shell: bash
        run: |
          git fetch origin i18n || true
          git checkout origin/i18n -- i18n 2>/dev/null || true
          test -d i18n || {
            echo "::error::No i18n branch data found. Run 01 Translate first."
            exit 1
          }
          TRANS_FILE="$(warpl10n select-translation \
            --i18n-root i18n \
            --version "${{ steps.upstream.outputs.version }}" \
            --lang "${{ steps.vars.outputs.lang }}")"
          echo "TRANS_FILE=$TRANS_FILE" >> "$GITHUB_ENV"
          echo "Using translation: $TRANS_FILE"

      - name: Apply localization
        if: ${{ steps.vars.outputs.should_build == 'true' }}
        shell: bash
        run: |
          warpl10n replace \
            --input "$TRANS_FILE" \
            --source-root warp \
            --do-not-translate config/do_not_translate.json
          warpl10n patch-update \
            --source-root warp \
            --repo "${{ github.repository }}" \
            --lang "${{ steps.vars.outputs.lang }}"
          git -C warp diff --binary > l10n.patch
          if [ ! -s l10n.patch ]; then
            echo "::warning::Localization patch is empty."
          fi

      - name: Upload localization patch
        if: ${{ steps.vars.outputs.should_build == 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: l10n-patch
          path: l10n.patch
          retention-days: 7

  build-windows-x86_64:
    name: Build Windows x64
    needs: prepare
    if: ${{ needs.prepare.outputs.should_build == 'true' && (needs.prepare.outputs.platform == 'windows-x86_64' || needs.prepare.outputs.platform == 'all') }}
    runs-on: windows-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v6

      - name: Download localization patch
        uses: actions/download-artifact@v8
        with:
          name: l10n-patch

      - name: Checkout Warp upstream
        shell: bash
        run: |
          set -euo pipefail
          git clone --filter=blob:none "$WARP_REPO" warp
          cd warp
          git checkout "${{ needs.prepare.outputs.upstream_ref }}" 2>/dev/null || {
            git fetch --depth 1 origin "${{ needs.prepare.outputs.upstream_ref }}"
            git checkout FETCH_HEAD
          }
          if [ -s "$GITHUB_WORKSPACE/l10n.patch" ]; then
            git apply "$GITHUB_WORKSPACE/l10n.patch"
          else
            echo "Localization patch is empty; continuing without applying a patch."
          fi

      - name: Prepare Warp build environment
        uses: ./warp/.github/actions/prepare_environment
        with:
          target_os: windows
          is_self_hosted: "false"
          install_release_deps: "true"

      - name: Build Warp OSS
        id: bundle
        shell: bash
        working-directory: warp
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ "${{ needs.prepare.outputs.build_installer }}" = "true" ]; then
            ./script/bundle --channel oss --nouniversal --release-tag "${{ needs.prepare.outputs.version }}"
          else
            ./script/bundle --channel oss --nouniversal --release-tag "${{ needs.prepare.outputs.version }}" --skip-build-installer
          fi

      - name: Package Windows artifacts
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $version = "${{ needs.prepare.outputs.version }}"
          $lang = "${{ needs.prepare.outputs.lang }}"
          $portableDir = "dist\portable"
          $releaseDir = "release-dist"
          New-Item -ItemType Directory -Force -Path $portableDir, $releaseDir | Out-Null

          # 1. Locate the built executable and its target profile directory.
          $exe = Get-ChildItem -Path .\warp\target -Recurse -Filter "warp-oss.exe" |
            Where-Object { $_.FullName -match "rlto" } |
            Select-Object -First 1
          if (-not $exe) { throw "warp-oss.exe not found" }
          $profileDir = Split-Path -Parent $exe.FullName
          Write-Host "Found executable: $($exe.FullName)"
          Write-Host "Target profile directory: $profileDir"

          # 2. Ensure resources exist even when bundle was run with --skip-build-installer.
          $resourcesDir = Join-Path $profileDir "resources"
          if (-not (Test-Path $resourcesDir)) {
            Write-Host "resources/ not found beside executable; preparing bundled resources now."
            & ".\warp\script\windows\prepare_bundled_resources.ps1" `
              -DestinationDir $resourcesDir `
              -Channel "oss" `
              -CargoProfile "rlto"
          }

          $requiredResources = @(
            (Join-Path $resourcesDir "bundled\metadata\version.json"),
            (Join-Path $resourcesDir "settings_schema.json"),
            (Join-Path $resourcesDir "THIRD_PARTY_LICENSES.txt")
          )
          foreach ($path in $requiredResources) {
            if (-not (Test-Path $path)) {
              throw "Required runtime resource is missing: $path"
            }
          }
          Write-Host "Verified bundled resources:"
          Get-ChildItem $resourcesDir -Recurse | Select-Object FullName | ForEach-Object { Write-Host "  + $($_.FullName)" }

          # 3. Build a portable runtime directory that mirrors the installer layout.
          Copy-Item $exe.FullName (Join-Path $portableDir "warp-oss.exe") -Force
          Copy-Item $resourcesDir (Join-Path $portableDir "resources") -Recurse -Force

          $windowsAssets = ".\warp\app\assets\windows\x64"
          $runtimeFiles = @(
            "conpty.dll",
            "vcruntime140.dll",
            "vcruntime140_1.dll",
            "msvcp140.dll",
            "dxcompiler.dll",
            "dxil.dll"
          )
          foreach ($file in $runtimeFiles) {
            $source = Join-Path $windowsAssets $file
            if (Test-Path $source) {
              Copy-Item $source (Join-Path $portableDir $file) -Force
            } else {
              Write-Warning "Optional runtime file not found: $source"
            }
          }

          $openConsole = Join-Path $windowsAssets "OpenConsole.exe"
          if (Test-Path $openConsole) {
            New-Item -ItemType Directory -Force -Path (Join-Path $portableDir "x64") | Out-Null
            Copy-Item $openConsole (Join-Path $portableDir "x64\OpenConsole.exe") -Force
          } else {
            Write-Warning "Optional OpenConsole.exe not found: $openConsole"
          }

          $icon = ".\warp\app\channels\oss\icon\no-padding\icon.ico"
          if (Test-Path $icon) {
            Copy-Item $icon (Join-Path $portableDir "icon.ico") -Force
          }

          $bootstrap = ".\warp\app\assets\bundled\bootstrap\pwsh.ps1"
          if (Test-Path $bootstrap) {
            Copy-Item $bootstrap (Join-Path $portableDir "pwsh.ps1") -Force
          }

          New-Item -ItemType Directory -Force -Path (Join-Path $portableDir "bin") | Out-Null
          $cmd = @(
            "@echo off"
            'set "WARP_CLI_MODE=1"'
            '"%~dp0..\warp-oss.exe" %*'
          )
          $cmd | Set-Content -Encoding ASCII (Join-Path $portableDir "bin\warp-oss.cmd")

          $readme = @(
            "# Warp OSS 汉化版 - 使用说明"
            ""
            "## 运行方法"
            "解压整个 zip 到同一文件夹，保持目录结构："
            "  warp-oss.exe"
            "  resources\"
            "    bundled\"
            "      metadata\"
            "        version.json"
            "    settings_schema.json"
            "    ..."
            ""
            "然后双击 warp-oss.exe 运行。"
            ""
            "## 注意事项"
            "- 必须保持 resources\ 目录与 warp-oss.exe 在同一目录下"
            "- 首次运行可能需要安装 Microsoft Edge WebView2 Runtime"
            "  下载地址: https://developer.microsoft.com/microsoft-edge/webview2/"
            "- 若仍无法启动，请检查是否安装了 Visual C++ Redistributable (x64)"
            "  下载地址: https://aka.ms/vs/17/release/vc_redist.x64.exe"
          )
          $readme | Set-Content -Encoding UTF8 (Join-Path $portableDir "README.txt")

          $portableZip = "warp-$lang-windows-x86_64-portable-$version.zip"
          Compress-Archive -Path "$portableDir\*" -DestinationPath (Join-Path $releaseDir $portableZip) -Force
          Write-Host "Portable package created: $portableZip"

          # 4. Copy the native installer as a separate release asset when it exists.
          $installerPath = "${{ steps.bundle.outputs.installer_path }}"
          if (-not $installerPath -or -not (Test-Path $installerPath)) {
            $installer = Get-ChildItem -Path ".\warp\script\windows\Output" -Filter "*.exe" -ErrorAction SilentlyContinue |
              Select-Object -First 1
            if ($installer) {
              $installerPath = $installer.FullName
            }
          }

          if ("${{ needs.prepare.outputs.build_installer }}" -eq "true") {
            if (-not $installerPath -or -not (Test-Path $installerPath)) {
              throw "build_installer=true but no Windows installer executable was found."
            }
            $installerName = "warp-$lang-windows-x86_64-setup-$version.exe"
            Copy-Item $installerPath (Join-Path $releaseDir $installerName) -Force
            Write-Host "Installer package copied: $installerName"
          }

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v7
        with:
          name: warp-${{ needs.prepare.outputs.lang }}-windows-x86_64
          path: release-dist/*

  build-linux-x86_64:
    name: Build Linux x64
    needs: prepare
    if: ${{ needs.prepare.outputs.should_build == 'true' && (needs.prepare.outputs.platform == 'linux-x86_64' || needs.prepare.outputs.platform == 'all') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v6

      - name: Download localization patch
        uses: actions/download-artifact@v8
        with:
          name: l10n-patch

      - name: Checkout Warp upstream
        shell: bash
        run: |
          set -euo pipefail
          git clone --filter=blob:none "$WARP_REPO" warp
          cd warp
          git checkout "${{ needs.prepare.outputs.upstream_ref }}" 2>/dev/null || {
            git fetch --depth 1 origin "${{ needs.prepare.outputs.upstream_ref }}"
            git checkout FETCH_HEAD
          }
          if [ -s "$GITHUB_WORKSPACE/l10n.patch" ]; then
            git apply "$GITHUB_WORKSPACE/l10n.patch"
          else
            echo "Localization patch is empty; continuing without applying a patch."
          fi

      - name: Prepare Warp build environment
        uses: ./warp/.github/actions/prepare_environment
        with:
          target_os: linux
          is_self_hosted: "false"
          install_release_deps: "true"

      - name: Build Warp OSS
        id: bundle
        shell: bash
        working-directory: warp
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          ./script/bundle --channel oss --nouniversal --release-tag "${{ needs.prepare.outputs.version }}" --packages binary

      - name: Package Linux artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "${{ steps.bundle.outputs.executable_path }}" dist/warp-oss
          tar -czf "warp-${{ needs.prepare.outputs.lang }}-linux-x86_64-${{ needs.prepare.outputs.version }}.tar.gz" -C dist .

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v7
        with:
          name: warp-${{ needs.prepare.outputs.lang }}-linux-x86_64
          path: warp-${{ needs.prepare.outputs.lang }}-linux-x86_64-${{ needs.prepare.outputs.version }}.tar.gz

  build-macos-aarch64:
    name: Build macOS ARM64
    needs: prepare
    if: ${{ needs.prepare.outputs.should_build == 'true' && (needs.prepare.outputs.platform == 'macos-aarch64' || needs.prepare.outputs.platform == 'all') }}
    runs-on: macos-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v6

      - name: Download localization patch
        uses: actions/download-artifact@v8
        with:
          name: l10n-patch

      - name: Checkout Warp upstream
        shell: bash
        run: |
          set -euo pipefail
          git clone --filter=blob:none "$WARP_REPO" warp
          cd warp
          git checkout "${{ needs.prepare.outputs.upstream_ref }}" 2>/dev/null || {
            git fetch --depth 1 origin "${{ needs.prepare.outputs.upstream_ref }}"
            git checkout FETCH_HEAD
          }
          if [ -s "$GITHUB_WORKSPACE/l10n.patch" ]; then
            git apply "$GITHUB_WORKSPACE/l10n.patch"
          else
            echo "Localization patch is empty; continuing without applying a patch."
          fi

      - name: Prepare Warp build environment
        uses: ./warp/.github/actions/prepare_environment
        with:
          target_os: macos
          is_self_hosted: "false"
          install_release_deps: "true"

      - name: Build Warp OSS
        id: bundle
        shell: bash
        working-directory: warp
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          ./script/bundle \
            --channel oss \
            --nouniversal \
            --arch aarch64 \
            --nosign \
            --release-tag "${{ needs.prepare.outputs.version }}" \
            --dmg-name-suffix "${{ needs.prepare.outputs.lang }}-${{ needs.prepare.outputs.version }}"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v7
        with:
          name: warp-${{ needs.prepare.outputs.lang }}-macos-aarch64
          path: ${{ steps.bundle.outputs.dmg_path }}

  release:
    name: Publish Release
    needs:
      - prepare
      - build-windows-x86_64
      - build-linux-x86_64
      - build-macos-aarch64
    if: >-
      always() &&
      needs.prepare.outputs.should_build == 'true' &&
      needs.prepare.outputs.publish_release == 'true' &&
      needs.prepare.result == 'success' &&
      (needs.build-windows-x86_64.result == 'success' || needs.build-windows-x86_64.result == 'skipped') &&
      (needs.build-linux-x86_64.result == 'success' || needs.build-linux-x86_64.result == 'skipped') &&
      (needs.build-macos-aarch64.result == 'success' || needs.build-macos-aarch64.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: warp-${{ needs.prepare.outputs.lang }}-*
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          cd artifacts
          sha256sum * > sha256sums.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          name: Warp ${{ needs.prepare.outputs.lang }} ${{ needs.prepare.outputs.version }}
          prerelease: ${{ needs.prepare.outputs.is_prerelease == 'true' }}
          files: artifacts/*
          body: |
            Warp OSS localized build.

            Upstream ref: ${{ needs.prepare.outputs.source_ref }}
            Upstream commit: ${{ needs.prepare.outputs.upstream_ref }}
            Language: ${{ needs.prepare.outputs.lang }}

            ## Windows 安装说明
            - `*-setup-*.exe`: 安装包，会安装 `warp-oss.exe` 和运行时资源。
            - `*-portable-*.zip`: 免安装包，解压整个 zip 后运行 `warp-oss.exe`。不要只复制 exe，必须保留同级 `resources\` 目录和其它运行时文件。
            - 安装版的内部更新检查会读取本仓库最新 Release，并下载对应的 `*-setup-*.exe` 安装包。
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
